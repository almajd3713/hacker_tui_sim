route: help_modal
child:
  type: modal
  name: help_modal
  width: 72
  height: 18
  backdrop_bg_color: "@surface_alt"
  child:
    type: box
    name: help_modal_box
    title: help overlay
    padding: 1
    style: rounded
    fg_color: "@accent"
    child:
      type: column
      name: help_modal_column
      children:
        - type: paragraph
          name: help_modal_text
          text_key: ui.help_text
          weight: 4
        - type: menu
          name: help_modal_menu
          bullet: "» "
          selected_fg_color: "@selection_fg"
          selected_bg_color: "@selection_bg"
          weight: 3
          items:
            - label: close overlay
              action: route_pop
            - label: jump to overview
              action: route_set
              payload:
                route: overview
            - label: jump to forensics
              action: route_set
              payload:
                route: forensics
            - label: jump to logs
              action: route_set
              payload:
                route: logs
