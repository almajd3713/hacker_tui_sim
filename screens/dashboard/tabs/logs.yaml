title: Logs
route: logs
child:
  type: column
  name: logs_screen
  children:
    - type: box
      name: logs_box
      title: event log
      padding: 1
      weight: 8
      child:
        type: scroll
        name: log_scroll
        focus_fg_color: "#59d0ff"
        child:
          type: log
          name: log_widget
          lines_key: logs.main
          max_lines: 80
          show_timestamp: true
    - type: box
      name: status_box
      title: operator note
      padding: 1
      weight: 2
      child:
        type: scroll
        name: logs_note_scroll
        focus_fg_color: "#59d0ff"
        child:
          type: paragraph
          name: logs_note
          text_key: ui.logs_note
    - type: status_strip
      name: logs_status_strip
      segments_key: ui.status_strip
      bg_color: bright_black
      weight: 1
