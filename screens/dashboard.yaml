theme:
  preset: clean_ops
  colors:
    text: "#d7d7e0"
    text_muted: "#5a5a78"
    surface: default
    surface_alt: "#1d2533"
    border: "#5a5a78"
    accent: "#59d0ff"
    accent_alt: "#cbb7ff"
    accent_hot: "#ff4d6d"
    focus_fg: "#59d0ff"
    focus_bg: "#1d2533"
    selection_fg: "#10131a"
    selection_bg: "#59d0ff"
    info: "#59d0ff"
    warn: "#ffd166"
    error: "#ff4d6d"
    success: "#4de0a8"
  fonts:
    text: JetBrains Mono
    border: JetBrains Mono
    heading: JetBrains Mono
  border:
    style: sharp
  text:
    font_name: "@font:text"
  widgets:
    tabs:
      fg_color: "@text_muted"
      bg_color: "@surface"
      active_fg_color: "@focus_fg"
      active_bg_color: "@surface_alt"
    status_strip:
      fg_color: "@text"
      bg_color: "@surface_alt"
    signal_strip:
      fg_color: "@text"
      bg_color: "@surface"
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    status_matrix:
      active_fg_color: "@selection_fg"
      active_bg_color: "@selection_bg"
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
      unknown_fg_color: "@text_muted"
    stat:
      accent_color: "@accent"
    metric_grid:
      accent_color: "@accent_alt"
    progress_bar:
      fill_color: "@accent"
    chart:
      axis_color: "@border"
      fill_color: "@accent"
    gauge:
      fill_color: "@accent"
      empty_color: "@border"
    histogram:
      fill_color: "@accent_alt"
    alert:
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    alert_stack:
      selected_fg_color: "@selection_fg"
      selected_bg_color: "@selection_bg"
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    heatmap:
      fg_color: "@accent"
      color_ramp: ["@text_muted", "@accent", "@success", "@warn", "@error"]
      bg_ramp: ["@surface", "@surface_alt", "@success", "@warn", "@error"]
      cell_char: " "
    list:
      selected_fg_color: "@selection_fg"
      selected_bg_color: "@selection_bg"
    tree:
      selected_fg_color: "@selection_fg"
      selected_bg_color: "@selection_bg"
    table:
      header_color: "@text"
      selected_fg_color: "@selection_fg"
      selected_bg_color: "@selection_bg"
    scroll:
      scrollbar_fg_color: "@border"
      scrollbar_bg_color: "@surface_alt"
    code_block:
      line_number_color: "@text_muted"
    hex_dump:
      offset_color: "@text_muted"
    divider:
      fg_color: "@border"
      bg_color: "@surface"
    log:
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    timeline:
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    event_feed:
      info_fg_color: "@info"
      warn_fg_color: "@warn"
      error_fg_color: "@error"
      success_fg_color: "@success"
    inspector:
      key_color: "@text_muted"
      value_color: "@text"
    kv_inspector:
      title_color: "@accent"
      key_color: "@text_muted"
      value_color: "@text"
    diff_viewer:
      added_fg_color: "@success"
      removed_fg_color: "@error"
      hint_fg_color: "@warn"
    flow:
      active_fg_color: "@accent"
      idle_fg_color: "@text_muted"
    modal:
      backdrop_bg_color: "#11131a"

state:
  flags:
    compact_mode: false
  selection:
    quick_action_index: 0
    relay_index: 0
    matrix_index: 0

router:
  routes:
    - overview
    - forensics
    - visuals
    - analysis
    - hacker
    - logs
    - debug_modal
    - help_modal
  initial: overview

dev:
  watch:
    enabled: true
    interval: 0.25
    debounce: 0.2
    paths:
      - dashboard/**/*.yaml

providers:
  include: dashboard/providers.yaml

screen:
  include: dashboard/screen.yaml
