name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-python-artifacts:
    name: Build Python artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip . pyinstaller

      - name: Build executable
        run: python -m PyInstaller --name hatui --onefile --collect-data hatui src/hatui/__main__.py

      - name: Smoke test executable validate
        run: .\dist\hatui.exe validate

      - name: Smoke test executable preview
        run: .\dist\hatui.exe preview --width 100 --height 28 --frames 1

      - name: Archive Windows executable
        shell: powershell
        run: |
          Compress-Archive -Path dist\hatui.exe, README.md, LICENSE -DestinationPath dist\hatui-windows-amd64.zip -Force

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/hatui-windows-amd64.zip

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-python-artifacts
    permissions:
      id-token: write

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python-artifacts, build-windows-exe]
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-artifacts

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-artifacts

      - name: Generate changelog
        run: |
          python tools/generate_changelog.py \
            --tag "${GITHUB_REF_NAME}" \
            --repo-url "https://github.com/almajd3713/hacker_tui_sim" \
            --output release-artifacts/RELEASE_NOTES.md

      - name: Generate checksums
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          artifact_dir = Path("release-artifacts")
          lines = []
          for path in sorted(p for p in artifact_dir.iterdir() if p.is_file()):
              digest = sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")
          (artifact_dir / "SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-artifacts/RELEASE_NOTES.md
          files: |
            release-artifacts/*
